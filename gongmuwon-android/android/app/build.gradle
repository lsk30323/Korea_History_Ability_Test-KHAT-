apply plugin: 'com.android.application'

// 릴리스 서명 설정 로딩.
// - 로컬: android/keystore.properties (git 에 올리지 않음) 에서 읽음
// - CI: 환경 변수(KEYSTORE_FILE / KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD)에서 읽음
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
def hasKeystoreProps = keystorePropertiesFile.exists()
if (hasKeystoreProps) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def signingStoreFile = hasKeystoreProps ? keystoreProperties['storeFile'] : System.getenv("KEYSTORE_FILE")
def signingStorePassword = hasKeystoreProps ? keystoreProperties['storePassword'] : System.getenv("KEYSTORE_PASSWORD")
def signingKeyAlias = hasKeystoreProps ? keystoreProperties['keyAlias'] : System.getenv("KEY_ALIAS")
def signingKeyPassword = hasKeystoreProps ? keystoreProperties['keyPassword'] : System.getenv("KEY_PASSWORD")
def hasReleaseSigning = signingStoreFile != null && !signingStoreFile.toString().isEmpty()

// versionCode 자동 증가.
// 우선순위: 환경 변수 VERSION_CODE > git 전체 커밋 수 > 1.
// git 커밋 수는 커밋이 쌓일수록 단조 증가하므로 새 빌드마다 자동으로 올라갑니다.
def computeVersionCode = {
    def env = System.getenv("VERSION_CODE")
    if (env != null && env.trim()) { return env.trim().toInteger() }
    try {
        def p = ["git", "rev-list", "--count", "HEAD"].execute(null, rootProject.rootDir)
        p.waitFor()
        def n = p.in.text.trim()
        if (n) { return n.toInteger() }
    } catch (Exception e) { logger.warn("versionCode: git count 실패, 기본값 사용 (${e.message})") }
    return 1
}
def computeVersionName = {
    def env = System.getenv("VERSION_NAME")
    return (env != null && env.trim()) ? env.trim() : "1.0"
}

android {
    namespace = "kr.co.vaultlife.khat.gongmuwon"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "kr.co.vaultlife.khat.gongmuwon"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode computeVersionCode()
        versionName computeVersionName()
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(signingStoreFile)
                storePassword signingStorePassword
                keyAlias signingKeyAlias
                keyPassword signingKeyPassword
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            // 서명 정보가 있을 때만 릴리스 서명 적용(없으면 디버그 빌드는 영향 없음)
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
