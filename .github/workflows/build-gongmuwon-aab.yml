name: Build 공무원 한능검 문제집 AAB (release, signed)

# Play 스토어 업로드용 서명된 릴리스 AAB 빌드.
# 수동 실행만(Actions 탭 → Run workflow). 서명에는 아래 Secrets 가 필요합니다:
#   KEYSTORE_BASE64    : release.keystore 를 base64 로 인코딩한 문자열 (base64 -w0 release.keystore)
#   KEYSTORE_PASSWORD  : 키스토어 비밀번호
#   KEY_ALIAS          : 키 별칭 (예: khat)
#   KEY_PASSWORD       : 키 비밀번호
# (Settings → Secrets and variables → Actions → New repository secret)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret 이 설정되지 않았습니다. RELEASE.md 를 참고해 Secrets 를 등록하세요."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Install dependencies
        working-directory: gongmuwon-android
        run: npm install

      - name: Build release AAB (signed)
        working-directory: gongmuwon-android
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          npm run build:aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: gongmuwon-khat-release-aab
          path: gongmuwon-android/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
