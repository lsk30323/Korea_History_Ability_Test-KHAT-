  var CIRC = ["①","②","③","④","⑤"];

  // ---- build flat index ----
  var ALL = [], BYSRC = {};

    (ED[k]||[]).forEach(function(q){
      q.exam = k;
      if(!q.src) q.src = (q.area||"q")+"-"+k+"-"+q.n;
      ALL.push(q); BYSRC[q.src] = q;
    });
  });
  var AREAS = ERA.concat(THEME);

  // ---- storage ----
  function load(k,d){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){ return d; } }
  function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
  function results(){ return load("hg2_results",[]); }
  function wrongMap(){ return load("hg2_wrong",{}); }
  function bestFor(exam){ var b=null; results().forEach(function(r){ if(r.exam===exam && (!b||r.correct>b.correct)) b=r; }); return b; }

  // ---- helpers ----

  function gradeOf(correct){
    var gs=C.grades||[]; for(var i=0;i<gs.length;i++){ if(correct>=gs[i].min) return gs[i]; }
    return gs[gs.length-1]||{label:"-",score:""};
  }
  function gclass(label){ return label.indexOf("1급")>=0?"g1":label.indexOf("2급")>=0?"g2":label.indexOf("3급")>=0?"g3":"g0"; }
  function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t;} return a; }
  var toastT;

  // ---- app state ----
  var app = document.getElementById("app");
  var S = { view:"home", tab:"home" };

  // ================= RENDER =================
  function render(){
    var v=S.view, html="";

    else if(v==="examList") html=vExamList();

    else if(v==="quiz") html=vQuiz();
    else if(v==="result") html=vResult();
    else if(v==="review") html=vReview();
    else if(v==="wrong") html=vWrong();

  // -------- QUIZ --------
  function startExam(k){
    S.mode="exam"; S.examNo=k; S.questions=(ED[k]||[]).slice().sort(function(a,b){return a.n-b.n;});

    go("quiz");
  }
  function startPractice(area,cnt){
    var pool = area==="ALL"?ALL:ALL.filter(function(q){return q.area===area;});
    S.mode="practice"; S.examNo=null; S.area=area;
    S.questions=shuffle(pool).slice(0,Math.min(cnt,pool.length));

    go("quiz");
  }
  function startWrongReview(){
    var w=wrongMap(); var srcs=Object.keys(w);

    S.mode="practice"; S.area="오답"; S.questions=shuffle(qs); S.idx=0; S.answers={}; S.revealed={};
    go("quiz");
  }

  function vQuiz(){
    var q=S.questions[S.idx], total=S.questions.length;
    var answered=Object.keys(S.answers).length;
    var h='<header class="bar"><button class="btn-back" data-quit="1">‹ 나가기</button>'+
      '<h1 style="font-size:15px">'+(S.mode==="exam"?"모의고사 "+S.examNo+"회":"연습 ("+esc(S.area)+")")+'</h1>'+
      (S.mode==="exam"?'<span class="timer" id="timer">80:00</span>':'<span class="pill">'+(S.idx+1)+'/'+total+'</span>')+'</header>';
    h+='<div class="progress"><i style="width:'+Math.round((S.idx+1)/total*100)+'%"></i></div>';
    h+='<div class="qtop" style="margin-top:12px"><span class="tag">'+esc(q.area)+'</span><span class="muted" style="font-size:12px">'+(S.idx+1)+'번 / '+total+'</span></div>';
    if(q.passage) h+='<div class="passage">'+esc(q.passage)+'</div>';
    h+='<div class="qtext">'+esc(q.q)+'</div>';
    var chosen=S.answers[S.idx], reveal=(S.mode==="practice" && S.revealed[S.idx]);
    for(var i=0;i<q.options.length;i++){
      var n=i+1, cls="opt";
      if(reveal){ if(n===q.answer)cls+=" correct"; else if(n===chosen)cls+=" wrong"; }
      else if(chosen===n)cls+=" sel";
      h+='<button class="'+cls+'" data-opt="'+n+'"'+(reveal?" disabled":"")+'><span class="num">'+CIRC[i]+'</span><span>'+esc(q.options[i])+'</span></button>';
    }
    if(reveal){
      h+='<div class="feedback '+(chosen===q.answer?"ok":"no")+'">'+(chosen===q.answer?"정답입니다 ✓":"오답 — 정답은 "+CIRC[q.answer-1]+"")+'</div>';
      h+=explBlock(q);
      h+='<button class="btn primary" data-next="1" style="margin-top:12px">'+(S.idx<total-1?"다음 문제 →":"연습 끝내기")+'</button>';
    } else if(S.mode==="practice"){
      h+='<button class="btn '+(chosen?"primary":"ghost")+'" data-check="1" style="margin-top:8px"'+(chosen?"":" disabled")+'>정답 확인</button>';
    } else {
      h+='<div class="btnrow" style="margin-top:12px">'+
         '<button class="btn ghost sm" data-prev="1"'+(S.idx===0?" disabled":"")+'>← 이전</button>'+
         (S.idx<total-1?'<button class="btn ghost sm" data-nextq="1">다음 →</button>':'<button class="btn gold sm" data-submit="1">제출</button>')+'</div>';
      h+='<hr class="soft"><div class="muted" style="font-size:12px;margin-bottom:6px">문항 이동 ('+answered+'/'+total+' 응시)</div><div class="jump">';
      for(var j=0;j<total;j++){ h+='<b class="'+(S.answers[j]!=null?"done":"")+(j===S.idx?" cur":"")+'" data-jump="'+j+'">'+(j+1)+'</b>'; }
      h+='</div><button class="btn gold" data-submit="1" style="margin-top:14px">제출하고 채점</button>';
    }
    return h;
  }
  function explBlock(q){
    var h='<div class="expl"><div class="lab">정답 근거</div><div>'+esc(q.reason||"")+'</div>';
    if(q.wrong && Object.keys(q.wrong).length){ h+='<div class="lab" style="margin-top:8px">오답 풀이</div>';
      [1,2,3,4,5].forEach(function(n){ if(q.wrong[n]) h+='<div class="w">'+CIRC[n-1]+' '+esc(q.wrong[n])+'</div>'; }); }
    if(q.keyword) h+='<div class="w" style="margin-top:8px"><b>한 줄:</b> '+esc(q.keyword)+'</div>';
    return h+'</div>';
  }
  function startExamTimer(){
    clearTimer(); var t=document.getElementById("timer");
    function tick(){
      var left=Math.max(0,Math.round((S.deadline-Date.now())/1000));
      var m=Math.floor(left/60),s=left%60;
      if(t){ t.textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s; t.classList.toggle("warn",left<=300); }
      if(left<=0){ clearTimer(); toast("시간 종료 — 자동 제출"); submitExam(); }
    }
    tick(); timerInt=setInterval(tick,1000);
  }

  function submitExam(){
    clearTimer();
    var qs=S.questions, correct=0, byArea={}, wm=wrongMap();
    qs.forEach(function(q,i){
      var ch=S.answers[i]||null, ok=(ch===q.answer);
      if(!byArea[q.area]) byArea[q.area]=[0,0];
      byArea[q.area][1]++; if(ok){byArea[q.area][0]++; correct++; delete wm[q.src];}
      else { wm[q.src]={area:q.area,exam:q.exam,n:q.n,q:q.q,ans:q.answer,chosen:ch,t:Date.now()}; }
    });
    save("hg2_wrong",wm);
    var rec={exam:S.examNo,date:Date.now(),correct:correct,total:qs.length,byArea:byArea,answers:{}};
    qs.forEach(function(q,i){rec.answers[i]=S.answers[i]||null;});
    var rs=results(); rs.push(rec); save("hg2_results",rs);
    S.lastResult=rec; go("result");
  }

  // -------- RESULT --------
  function vResult(){
    var r=S.lastResult, g=gradeOf(r.correct), est=Math.min(100,r.correct*2);
    var eraC=0,eraT=0,thC=0,thT=0;
    Object.keys(r.byArea).forEach(function(a){ var x=r.byArea[a]; if(ERA.indexOf(a)>=0){eraC+=x[0];eraT+=x[1];}else{thC+=x[0];thT+=x[1];} });
    var h=header("채점 결과","home");
    h+='<div class="card center"><div class="muted" style="font-size:13px">모의고사 '+r.exam+'회</div>'+
       '<div class="big">'+r.correct+'<span style="font-size:24px;color:var(--muted)">/'+r.total+'</span></div>'+
       '<div style="margin:6px 0"><span class="gradeb '+gclass(g.label)+'" style="font-size:16px">예상 '+g.label+' · 약 '+est+'점</span></div>'+
       '<div class="muted" style="font-size:12px">시대 '+eraC+'/'+eraT+' · 주제 '+thC+'/'+thT+' · 2급 목표 40개</div></div>';
    h+='<div class="card"><div style="font-weight:800;margin-bottom:8px">영역별 정답</div>';
    AREAS.forEach(function(a){ var x=r.byArea[a]; if(!x)return; var pct=Math.round(x[0]/x[1]*100);
      h+='<div class="list-item row"><div>'+esc(a)+' <span class="muted" style="font-size:12px">'+(ERA.indexOf(a)>=0?"시대":"주제")+'</span></div>'+
         '<div style="font-weight:800;color:'+(pct>=80?"var(--ok)":pct>=60?"var(--accent)":"var(--no)")+'">'+x[0]+'/'+x[1]+'</div></div>';
    });
    h+='</div>';
    h+='<button class="btn primary" data-review="1">📖 문항별 해설 보기</button>';
    h+='<div class="btnrow" style="margin-top:10px"><button class="btn ghost sm" data-retry="'+r.exam+'">다시 풀기</button><button class="btn ghost sm" data-go="home">홈으로</button></div>';
    return h;
  }

  // -------- REVIEW --------
  function vReview(){
    var r=S.lastResult, qs=S.questions, only=S.reviewWrong;
    var h=header("해설 ("+(only?"오답만":"전체")+")","result");
    h+='<button class="btn ghost sm" data-togglerev="1" style="margin-bottom:12px">'+(only?"전체 보기":"틀린 것만 보기")+'</button>';
    qs.forEach(function(q,i){
      var ch=r.answers[i], ok=(ch===q.answer);
      if(only&&ok) return;
      h+='<div class="card"><div class="qtop"><span class="tag">'+esc(q.area)+'</span><span class="muted" style="font-size:12px">'+(i+1)+'번</span>'+
         '<span class="pill '+(ok?"":"")+'" style="background:'+(ok?"#e9f3ec":"#f7e7e3")+';color:'+(ok?"#1f7a4d":"#b04434")+'">'+(ok?"정답":"오답")+'</span></div>';
      if(q.passage) h+='<div class="passage">'+esc(q.passage)+'</div>';
      h+='<div class="qtext" style="font-size:15px">'+esc(q.q)+'</div>';
      for(var k=0;k<q.options.length;k++){ var n=k+1,cls="opt";
        if(n===q.answer)cls+=" correct"; else if(n===ch)cls+=" wrong";
        h+='<div class="'+cls+'"><span class="num">'+CIRC[k]+'</span><span>'+esc(q.options[k])+'</span></div>'; }
      h+=explBlock(q)+'</div>';
    });
    return h;
  }

  // -------- WRONG NOTE --------
  function vWrong(){
    var w=wrongMap(), srcs=Object.keys(w);
    var h=header("오답노트",null);
    if(!srcs.length){ h+='<div class="card center" style="padding:30px 16px"><div style="font-size:30px">🎉</div><div style="font-weight:800;margin-top:8px">오답이 없습니다</div><div class="muted" style="font-size:13px">모의고사를 풀면 틀린 문제가 자동 저장됩니다.</div></div>'; return h; }
    h+='<div class="row" style="margin-bottom:10px"><div style="font-weight:800">총 '+srcs.length+'문항</div>'+
       '<div class="btnrow" style="width:auto;gap:8px"><button class="btn gold sm" data-wrongreview="1" style="width:auto;padding:8px 14px">복습 풀기</button>'+
       '<button class="btn ghost sm" data-clearwrong="1" style="width:auto;padding:8px 14px">전체 삭제</button></div></div>';
    var byA={}; srcs.forEach(function(s){ var a=w[s].area||"기타"; (byA[a]=byA[a]||[]).push(s); });
    AREAS.forEach(function(a){ if(!byA[a])return;
      h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">'+esc(a)+' <span class="muted" style="font-size:12px">'+byA[a].length+'</span></div>';
      byA[a].forEach(function(s){ var q=BYSRC[s]||w[s];
        h+='<div class="list-item"><div style="font-size:14px;font-weight:700">'+esc((q.q||"").slice(0,46))+(((q.q||"").length>46)?"…":"")+'</div>'+
           '<div class="muted" style="font-size:12px;margin-top:2px">'+esc(w[s].exam? (w[s].exam+"회 "+w[s].n+"번"):"")+' · 내 답 '+(w[s].chosen?CIRC[w[s].chosen-1]:"무응답")+' → 정답 '+CIRC[(BYSRC[s]?BYSRC[s].answer:w[s].ans)-1]+'</div>'+
           (BYSRC[s]?'<div class="expl" style="margin-top:6px"><div class="w">'+esc(BYSRC[s].keyword||BYSRC[s].reason||"")+'</div></div>':'')+'</div>';
      });
      h+='</div>';
    });
    return h;
  }

  // -------- CONCEPTS --------
  function vConcepts(){
    var h=header("개념 · D-7 요약",null);
    h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">① 시대별 한 줄 뼈대</div>';
    C.bones.forEach(function(b){ h+='<div class="list-item"><b style="color:var(--accent)">'+esc(b[0])+'</b> <span style="font-size:14px">'+esc(b[1])+'</span></div>'; });
    h+='</div>';
    h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">② 必出 순서 6종</div>';
    C.sequences.forEach(function(s){ h+='<div class="list-item"><b>'+esc(s[0])+'</b><div class="seq">'; s[1].forEach(function(step,i){ h+=(i?'<i>→</i>':'')+'<span>'+esc(step)+'</span>'; }); h+='</div></div>'; });
    h+='</div>';
    h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">③ 必出 함정 짝 ★</div>';
    C.traps.forEach(function(t){ h+='<div class="list-item" style="font-size:14px">'+esc(t)+'</div>'; });
    h+='</div>';
    h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">④ 주제 매칭</div>';
    C.matching.forEach(function(m){ h+='<div class="list-item"><b style="color:var(--accent)">'+esc(m[0])+'</b><div style="font-size:14px;margin-top:2px">'+esc(m[1])+'</div></div>'; });
    h+='</div>';
    h+='<div class="card" style="border-color:var(--gold)"><div style="font-weight:800;margin-bottom:6px;color:var(--gold)">⑤ 시험장 직전 TOP 6</div>';
    C.top6.forEach(function(t,i){ h+='<div class="list-item" style="font-size:14px"><b>'+(i+1)+'.</b> '+esc(t)+'</div>'; });
    h+='</div>';
    h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">점수 환산 (정답 수 → 급)</div>';
    C.grades.forEach(function(g){ h+='<div class="list-item row"><div><span class="gradeb '+gclass(g.label)+'">'+g.label+'</span></div><div class="muted">'+esc(g.label==="불합격"?"~29개":("≥"+g.min+"개"))+' · '+esc(g.score)+'</div></div>'; });
    h+='<div class="muted" style="font-size:12px;margin-top:8px">※ 1~3점 차등이라 근사치. 2급 안정권 = 40개(80%).</div></div>';
    return h;
  }

  // ================= EVENTS =================
  function bind(){
    app.querySelectorAll("[data-go]").forEach(function(e){e.onclick=function(){go(e.getAttribute("data-go"));};});
    app.querySelectorAll("[data-theme-toggle]").forEach(function(e){e.onclick=toggleTheme;});
    app.querySelectorAll("[data-nav]").forEach(function(e){e.onclick=function(){go(e.getAttribute("data-nav"));};});
    app.querySelectorAll("[data-tile]").forEach(function(e){e.onclick=function(){var t=e.getAttribute("data-tile");go(t==="exam"?"examList":t==="practice"?"practiceSetup":t);};});
    app.querySelectorAll("[data-exam]").forEach(function(e){e.onclick=function(){startExam(e.getAttribute("data-exam"));};});
    var ib=document.getElementById("installBtn"); if(ib) ib.onclick=function(){ if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;} };

    if(S.view==="practiceSetup"){
      app.querySelectorAll("#chips .chip").forEach(function(e){e.onclick=function(){app.querySelectorAll("#chips .chip").forEach(function(x){x.classList.remove("on");});e.classList.add("on");S.pArea=e.getAttribute("data-area");};});
      app.querySelectorAll("#cnts .chip").forEach(function(e){e.onclick=function(){app.querySelectorAll("#cnts .chip").forEach(function(x){x.classList.remove("on");});e.classList.add("on");S.pCnt=+e.getAttribute("data-cnt");};});
      var sp=document.getElementById("startPractice"); if(sp) sp.onclick=function(){ startPractice(S.pArea||"ALL", S.pCnt||5); };
    }

    if(S.view==="quiz"){
      app.querySelectorAll("[data-opt]").forEach(function(e){e.onclick=function(){ S.answers[S.idx]=+e.getAttribute("data-opt"); render(); };});
      var bk=app.querySelector("[data-quit]"); if(bk) bk.onclick=function(){ if(confirm("나가면 진행 중인 풀이가 사라집니다. 나갈까요?")) go(S.mode==="exam"?"examList":"home"); };
      var pv=app.querySelector("[data-prev]"); if(pv) pv.onclick=function(){ if(S.idx>0){S.idx--;render();} };
      var nq=app.querySelector("[data-nextq]"); if(nq) nq.onclick=function(){ if(S.idx<S.questions.length-1){S.idx++;render();} };
      app.querySelectorAll("[data-jump]").forEach(function(e){e.onclick=function(){ S.idx=+e.getAttribute("data-jump"); render(); };});
      var ck=app.querySelector("[data-check]"); if(ck) ck.onclick=function(){ if(S.answers[S.idx]){ S.revealed[S.idx]=true; recordPractice(); render(); } };
      var nx=app.querySelector("[data-next]"); if(nx) nx.onclick=function(){ if(S.idx<S.questions.length-1){S.idx++;render();} else { toast("연습 완료"); go("home"); } };
      var sb=app.querySelector("[data-submit]"); if(sb) sb.onclick=function(){ var un=S.questions.length-Object.keys(S.answers).length; if(un>0 && !confirm(un+"문항이 미응시입니다. 제출할까요?")) return; submitExam(); };
    }

    if(S.view==="result"){
      var rv=app.querySelector("[data-review]"); if(rv) rv.onclick=function(){ S.reviewWrong=false; go("review"); };
      var rt=app.querySelector("[data-retry]"); if(rt) rt.onclick=function(){ startExam(rt.getAttribute("data-retry")); };
    }
    if(S.view==="review"){
      var tg=app.querySelector("[data-togglerev]"); if(tg) tg.onclick=function(){ S.reviewWrong=!S.reviewWrong; render(); };
    }
    if(S.view==="wrong"){
      var wr=app.querySelector("[data-wrongreview]"); if(wr) wr.onclick=startWrongReview;
      var cw=app.querySelector("[data-clearwrong]"); if(cw) cw.onclick=function(){ if(confirm("오답노트를 모두 비울까요?")){ save("hg2_wrong",{}); render(); } };
    }
  }
  function recordPractice(){
    var q=S.questions[S.idx], ch=S.answers[S.idx], wm=wrongMap();
    if(ch===q.answer){ delete wm[q.src]; } else { wm[q.src]={area:q.area,exam:q.exam,n:q.n,q:q.q,ans:q.answer,chosen:ch,t:Date.now()}; }
    save("hg2_wrong",wm);
  }

  // theme (다크모드)
  function isDark(){ var t=document.documentElement.getAttribute("data-theme"); if(t) return t==="dark"; return !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches); }
  function applyTheme(){ var t=load("hg2_theme",null); if(t==="dark"||t==="light") document.documentElement.setAttribute("data-theme",t); else document.documentElement.removeAttribute("data-theme"); var m=document.querySelector('meta[name="theme-color"]'); if(m) m.setAttribute("content", isDark()?"#0f141b":"#1e3a5f"); }
  function toggleTheme(){ save("hg2_theme", isDark()?"light":"dark"); applyTheme(); render(); }

  // PWA
  window.addEventListener("beforeinstallprompt",function(e){ e.preventDefault(); deferredPrompt=e; if(S.view==="home") render(); });

  // boot
  applyTheme();
  if(!ALL.length){ app.innerHTML='<div class="card" style="margin-top:40px"><b>데이터를 불러오지 못했습니다.</b><div class="muted" style="font-size:13px;margin-top:6px">data/exam-1~5.js 파일이 같은 폴더에 있어야 합니다. 로컬 서버 또는 설치 환경에서 열어 주세요.</div></div>'; }
  else render();
})();
</script>
</body>
</html>
