    ["4대 사화", ["무오(1498)", "갑자(1504)", "기묘(1519)", "을사(1545)"]],
    ["근대 사건", ["강화도조약(1876)", "임오(1882)", "갑신(1884)", "동학·갑오(1894)", "을미(1895)", "을사(1905)"]],
    ["정부 수립", ["모스크바 3상", "미소공위", "5·10 총선", "제헌헌법", "정부 수립(1948)"]],
    ["통일정책", ["7·4 공동성명(1972)", "남북기본합의서(1991)", "6·15(2000)", "10·4(2007)"]],
  ],
  traps: [
    "비파형동검=청동기 / 세형동검=철기 · 서옥제=고구려 / 민며느리제=옥저",
    "녹읍 폐지=신문왕 / 정전=성덕왕 / 녹읍 부활=경덕왕",
    "초조대장경=거란·소실 / 팔만대장경=몽골·현존 · 교관겸수=의천 / 정혜쌍수=지눌",
    "강동 6주=거란·서희 / 동북 9성=여진·윤관",
    "경국대전=세조 시작·성종 완성 · 6조 직계제(태종·세조) / 의정부 서사제(세종)",
    "영조=탕평비·균역법 / 정조=규장각·장용영·수원화성",
    "신분제 폐지=갑오(군국기무처) / 단발령·태양력=을미",
    "봉오동·청산리=독립군 부대 / 의열단·한인애국단=개인 의거",
    "발췌 개헌(1952)=직선제 / 사사오입(1954)=중임 철폐 · 직선제 개헌=6월 항쟁(1987)",
    "최초 합의=7·4(1972) / 최초 정상회담=6·15(2000)",
  ],
  matching: [
    ["명절", "정월대보름(부럼·오곡밥·쥐불놀이) / 단오(창포·그네·수리취떡) / 동지(팥죽) / 추석(송편). 양력=한식·동지·24절기."],
    ["유네스코 3범주", "종묘=세계유산 / 종묘제례=무형 · 장경판전(건물)=세계유산 / 팔만대장경판=기록유산 · 판소리·씨름=무형(기록유산 아님)."],
    ["인물 키워드", "원효(일심·화쟁), 최치원(6두품·토황소격문), 서희/강감찬, 정약용(목민심서·거중기), 박제가(북학의), 안중근(이토), 신민회=안창호, 의열단=김원봉, 한인애국단=김구."],
    ["문화재 양식", "미륵사지·정림사지=백제 / 분황사 모전석탑=신라 / 석가탑·다보탑=통일신라 / 경천사지 10층=고려·원각사지 10층=조선. 주심포=고려. 자기 청자→분청사기→백자."],
  ],
  top6: [
    "관료전/정전/녹읍부활 = 신문왕/성덕왕/경덕왕",
    "경국대전 = 세조 시작·성종 완성",
    "갑오(신분제 폐지) ↔ 을미(단발령)",
    "직선제 개헌 = 6월 항쟁(1987) — 4·19 아님",
    "최초 정상회담 = 6·15(2000) — 7·4는 최초 '합의'",
    "종묘제례·판소리·씨름 = 무형유산",
  ],
  grades: [
    { min: 40, label: "1급", score: "80~100점" },
    { min: 35, label: "2급", score: "70~79점" },
    { min: 30, label: "3급", score: "60~69점" },
    { min: 0, label: "불합격", score: "60점 미만" },
  ],
};
</script>
<script>
(function(){
  "use strict";
  var ED = window.EXAM_DATA || {};
  var C = window.CONCEPTS || {bones:[],sequences:[],traps:[],matching:[],top6:[],grades:[]};
  var ERA = ["선사","고대","고려","조선전기","조선후기","근대","일제강점기","현대"];
  var THEME = ["세시풍속","유네스코","지역사","인물사","문화재"];
  var CIRC = ["①","②","③","④","⑤"];

  // ---- build flat index ----
  var ALL = [], BYSRC = {};
  Object.keys(ED).sort().forEach(function(k){
    (ED[k]||[]).forEach(function(q){
      q.exam = k;
      if(!q.src) q.src = (q.area||"q")+"-"+k+"-"+q.n;
      ALL.push(q); BYSRC[q.src] = q;
    });
  });
  var AREAS = ERA.concat(THEME);

  // ---- storage ----
  function load(k,d){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){ return d; } }
  function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} cloudMaybe(k); }
  function fbReady(){ return !!(window.HG2SYNC && window.HG2SYNC.enabled); }
  function cloudMaybe(k){ if(fbReady() && S.fbUid && k.indexOf("hg2:"+S.fbUid+":")===0){ try{ HG2SYNC.push(S.fbUid,{results:load("hg2:"+S.fbUid+":results",[]),wrong:load("hg2:"+S.fbUid+":wrong",{}),bm:load("hg2:"+S.fbUid+":bm",[])}); }catch(e){} } }
  function onFbUser(u){
    if(!u){ S.fbUid=null; return; }
    S.fbUid=u.uid;
    var ps=profiles(), ex=ps.filter(function(p){return p.id===u.uid;})[0];
    var prov=(u.providerData&&u.providerData[0]&&u.providerData[0].providerId)||"";
    if(!ex){ ps.push({id:u.uid,type:prov.indexOf("google")>=0?"google":"email",name:u.displayName||((u.email||"").split("@")[0])||"사용자",email:u.email||"",created:Date.now()}); setProfiles(ps); }
    setCur(u.uid);
    try{ HG2SYNC.pull(u.uid).then(function(d){
      if(d){ if(d.results) save("hg2:"+u.uid+":results",d.results); if(d.wrong) save("hg2:"+u.uid+":wrong",d.wrong); if(d.bm) save("hg2:"+u.uid+":bm",d.bm); }
      if(S.view==="login"||S.view==="account") go("home"); else render();
    }).catch(function(){ if(S.view==="login") go("home"); }); }catch(e){ if(S.view==="login") go("home"); }
  }
  // ---- 프로필(로그인) ----
  var GOOGLE_CLIENT_ID = ""; // Google OAuth 클라이언트 ID 입력 시 구글 로그인 활성화
  function profiles(){ return load("hg2_profiles", []); }
  function setProfiles(p){ save("hg2_profiles", p); }
  function curId(){ return load("hg2_current", null); }
  function setCur(id){ if(id==null){ try{localStorage.removeItem("hg2_current");}catch(e){} } else save("hg2_current", id); }
  function curProfile(){ var id=curId(); return profiles().filter(function(p){return p.id===id;})[0]||null; }
  function pkey(k){ return "hg2:"+(curId()||"guest")+":"+k; }
  function addProfile(type, name, email){
    var ps=profiles();
    if(email){ var ex=ps.filter(function(x){return x.email===email;})[0]; if(ex){ setCur(ex.id); return ex; } }
    var id=type+"_"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
    var p={id:id,type:type,name:name||"게스트",email:email||"",created:Date.now()};
    ps.push(p); setProfiles(ps); setCur(id); return p;
  }
  function migrateLegacy(){
    if(profiles().length) return;
    var oldR=load("hg2_results",null), oldW=load("hg2_wrong",null);
    if(oldR||oldW){ var p={id:"local_legacy",type:"guest",name:"내 기록",email:"",created:Date.now()}; setProfiles([p]); setCur(p.id);
      if(oldR) save("hg2:"+p.id+":results", oldR); if(oldW) save("hg2:"+p.id+":wrong", oldW); }
  }
  function results(){ return load(pkey("results"),[]); }
  function wrongMap(){ return load(pkey("wrong"),{}); }
  function bestFor(exam){ var b=null; results().forEach(function(r){ if(r.exam===exam && (!b||r.correct>b.correct)) b=r; }); return b; }

  // ---- helpers ----
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  function gradeOf(correct){
    var gs=C.grades||[]; for(var i=0;i<gs.length;i++){ if(correct>=gs[i].min) return gs[i]; }
    return gs[gs.length-1]||{label:"-",score:""};
  }
  function gclass(label){ return label.indexOf("1급")>=0?"g1":label.indexOf("2급")>=0?"g2":label.indexOf("3급")>=0?"g3":"g0"; }
  function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t;} return a; }
  var toastT;
  function toast(m){ var t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove("show");},1600); }

  // ---- app state ----
  var app = document.getElementById("app");
  var S = { view:"home", tab:"home" };
  var timerInt=null, deferredPrompt=null;

  function clearTimer(){ if(timerInt){clearInterval(timerInt);timerInt=null;} }
  function go(view){ clearTimer(); S.view=view; render(); window.scrollTo(0,0); }

  // ================= RENDER =================
  function render(){
    var v=S.view, html="";
    if(v==="home") html=vHome();
    else if(v==="examList") html=vExamList();
    else if(v==="practiceSetup") html=vPracticeSetup();
    else if(v==="quiz") html=vQuiz();
    else if(v==="result") html=vResult();
    else if(v==="review") html=vReview();
    else if(v==="wrong") html=vWrong();
    else if(v==="concepts") html=vConcepts();
    else if(v==="stats") html=vStats();
    else if(v==="login") html=vLogin();
    else if(v==="account") html=vAccount();
    else if(v==="search") html=vSearch();
    else if(v==="bookmarks") html=vBookmarks();
    else if(v==="question") html=vQuestion();
    var showNav = ["home","examList","practiceSetup","wrong","concepts","stats","account","search","bookmarks"].indexOf(v)>=0;
    app.innerHTML = html + (showNav? vNav() : "");
    bind();
    if(v==="quiz" && S.mode==="exam") startExamTimer();
  }

  function header(title,backTo){
    return '<header class="bar">'+(backTo!=null?'<button class="btn-back" data-go="'+backTo+'">‹ 뒤로</button>':'')+'<h1>'+esc(title)+'</h1><button class="btn-back" data-go="account" aria-label="계정" style="background:none;font-size:17px;padding:6px 8px">👤</button><button class="btn-back" data-theme-toggle="1" aria-label="다크모드 전환" style="background:none;font-size:18px;padding:6px 8px">'+(isDark()?'☀️':'🌙')+'</button></header>';
  }
  function vNav(){
    function b(tab,ic,label){ return '<button class="'+(S.view===tab?"on":"")+'" data-nav="'+tab+'"><span class="ic">'+ic+'</span>'+label+'</button>'; }
    return '<div class="nav">'+b("home","🏠","홈")+b("stats","📊","통계")+b("wrong","✕","오답노트")+b("concepts","📌","개념")+'</div>';
  }

  // -------- HOME --------
  function vHome(){
    var rs=results(), wn=Object.keys(wrongMap()).length;
    var taken=rs.length, best=rs.reduce(function(m,r){return Math.max(m,r.correct);},0);
    var h=header("한능검 2급 합격 마스터",null);
    h+='<div class="hero"><div class="kword">KOREAN HISTORY · LEVEL 2</div>'+
       '<h2>한능검 2급<br>합격 마스터</h2>'+
       '<p>모의고사 '+Object.keys(ED).length+'회 · '+ALL.length+'문항 · 해설 · 오답노트</p></div>';
    h+='<div style="display:flex;gap:8px;margin:14px 0"><input id="homeSearch" class="lginput" style="margin:0;flex:1;width:auto" placeholder="🔍 문제 검색 (예: 신문왕, 갑오개혁)"><button class="btn primary" data-dosearch="1" style="width:auto;padding:0 18px">검색</button></div>';
    h+='<div class="grid">'+
      tile("exam","📝","모의고사",Object.keys(ED).length+"회분 · 자동채점·급환산")+
      tile("practice","🎯","영역 연습","13개 영역 랜덤 풀이")+
      tile("wrong","✕","오답노트","틀린 문제 자동 누적")+
      tile("concepts","📌","개념·D-7","시대 뼈대·함정·요약")+
      tile("stats","📊","통계","영역별 약점·점수 추이")+
      tile("bookmarks","⭐","북마크","즐겨찾기한 문제 복습")+
    '</div>';
    h+='<button class="btn ghost" data-ext="http://tok.historyexam.go.kr/" style="margin-bottom:12px">🏛️ 공식 기출문제 풀기 (국사편찬위·무료)</button>';
    var st=streakInfo();
    h+='<div class="card"><div class="row"><div><div class="muted" style="font-size:12px">학습 현황</div>'+
       '<div style="font-weight:800;margin-top:2px">🔥 '+st.streak+'일 연속 · 응시 '+taken+'회 · 최고 '+best+'/50</div>'+
       '<div class="muted" style="font-size:12px;margin-top:3px">오답 '+wn+'개 · 오늘 '+(st.today?"완료 ✓":"미완 — 1세트!")+'</div></div>'+
       '<span class="pill gold">2급 40개</span></div></div>';
    if(deferredPrompt) h+='<button class="btn gold" id="installBtn" style="margin-bottom:12px">📲 홈 화면에 앱 설치</button>';
    return h;
  }
  function tile(go,ic,t,d){ return '<div class="tile" data-tile="'+go+'"><div class="ic">'+ic+'</div><div class="t">'+t+'</div><div class="d">'+d+'</div></div>'; }

  // -------- EXAM LIST --------
  function vExamList(){
    var h=header("모의고사 5회","home");
    h+='<p class="kbar">실전과 동일하게 50문항 · 80분. 다 푼 뒤 자동 채점됩니다.</p>';
    Object.keys(ED).sort().forEach(function(k){
      var b=bestFor(k), n=(ED[k]||[]).length;
      var right = b? '<span class="gradeb '+gclass(gradeOf(b.correct).label)+'">'+b.correct+'/50 · '+gradeOf(b.correct).label+'</span>' : '<span class="pill">미응시</span>';
      h+='<div class="card examcard" data-exam="'+k+'"><div class="no">'+k+'</div>'+
         '<div class="meta"><div class="ti">모의고사 '+k+'회</div><div class="su">'+n+'문항 · 시대 38 + 주제 12</div></div>'+right+'</div>';
    });
    return h;
  }

  // -------- PRACTICE SETUP --------
  function vPracticeSetup(){
    var h=header("영역 연습","home");
    h+='<p class="kbar">영역을 고르면 그 영역 문제를 랜덤으로 풀고, 바로 정답·해설을 확인합니다.</p>';
    h+='<div class="card"><div style="font-weight:800;margin-bottom:10px">영역 선택</div><div class="areachips" id="chips">';
    h+='<button class="chip on" data-area="ALL">전체</button>';
    AREAS.forEach(function(a){ var cnt=ALL.filter(function(q){return q.area===a;}).length; h+='<button class="chip" data-area="'+a+'">'+a+' <span class="muted">'+cnt+'</span></button>'; });
    h+='</div></div>';
    h+='<div class="card"><div style="font-weight:800;margin-bottom:10px">문항 수</div><div class="areachips" id="cnts">';
    [5,10,20].forEach(function(c,i){ h+='<button class="chip'+(i===0?" on":"")+'" data-cnt="'+c+'">'+c+'문항</button>'; });
    h+='</div></div>';
    h+='<button class="btn primary" id="startPractice">연습 시작</button>';
    return h;
  }

  // -------- QUIZ --------
  function startExam(k){
    S.mode="exam"; S.examNo=k; S.questions=(ED[k]||[]).slice().sort(function(a,b){return a.n-b.n;});
    S.idx=0; S.answers={}; S.deadline=Date.now()+80*60*1000;
    go("quiz");
  }
  function startPractice(area,cnt){
    var pool = area==="ALL"?ALL:ALL.filter(function(q){return q.area===area;});
    S.mode="practice"; S.examNo=null; S.area=area;
    S.questions=shuffle(pool).slice(0,Math.min(cnt,pool.length));
    S.idx=0; S.answers={}; S.revealed={};
    go("quiz");
  }
  function startWrongReview(){
    var w=wrongMap(); var srcs=Object.keys(w);
    var qs=srcs.map(function(s){return BYSRC[s];}).filter(Boolean);
    if(!qs.length){ toast("오답이 없습니다"); return; }
    S.mode="practice"; S.area="오답"; S.questions=shuffle(qs); S.idx=0; S.answers={}; S.revealed={};
    go("quiz");
  }

  function vQuiz(){
    var q=S.questions[S.idx], total=S.questions.length;
    var answered=Object.keys(S.answers).length;
    var h='<header class="bar"><button class="btn-back" data-quit="1">‹ 나가기</button>'+
      '<h1 style="font-size:15px">'+(S.mode==="exam"?"모의고사 "+S.examNo+"회":"연습 ("+esc(S.area)+")")+'</h1>'+
      (S.mode==="exam"?'<span class="timer" id="timer">80:00</span>':'<span class="pill">'+(S.idx+1)+'/'+total+'</span>')+'</header>';
    h+='<div class="progress"><i style="width:'+Math.round((S.idx+1)/total*100)+'%"></i></div>';
    h+='<div class="qtop" style="margin-top:12px"><span class="tag">'+esc(q.area)+'</span><span class="muted" style="font-size:12px">'+(S.idx+1)+'번 / '+total+'</span></div>';
    if(q.passage) h+='<div class="passage">'+esc(q.passage)+'</div>';
    h+='<div class="qtext">'+esc(q.q)+'</div>';
    var chosen=S.answers[S.idx], reveal=(S.mode==="practice" && S.revealed[S.idx]);
    for(var i=0;i<q.options.length;i++){
      var n=i+1, cls="opt";
      if(reveal){ if(n===q.answer)cls+=" correct"; else if(n===chosen)cls+=" wrong"; }
      else if(chosen===n)cls+=" sel";
      h+='<button class="'+cls+'" data-opt="'+n+'"'+(reveal?" disabled":"")+'><span class="num">'+CIRC[i]+'</span><span>'+esc(q.options[i])+'</span></button>';
    }
    if(reveal){
      h+='<div class="feedback '+(chosen===q.answer?"ok":"no")+'">'+(chosen===q.answer?"정답입니다 ✓":"오답 — 정답은 "+CIRC[q.answer-1]+"")+'</div>';
      h+=explBlock(q);
      h+='<button class="btn primary" data-next="1" style="margin-top:12px">'+(S.idx<total-1?"다음 문제 →":"연습 끝내기")+'</button>';
    } else if(S.mode==="practice"){
      h+='<button class="btn '+(chosen?"primary":"ghost")+'" data-check="1" style="margin-top:8px"'+(chosen?"":" disabled")+'>정답 확인</button>';
    } else {
      h+='<div class="btnrow" style="margin-top:12px">'+
         '<button class="btn ghost sm" data-prev="1"'+(S.idx===0?" disabled":"")+'>← 이전</button>'+
         (S.idx<total-1?'<button class="btn ghost sm" data-nextq="1">다음 →</button>':'<button class="btn gold sm" data-submit="1">제출</button>')+'</div>';
      h+='<hr class="soft"><div class="muted" style="font-size:12px;margin-bottom:6px">문항 이동 ('+answered+'/'+total+' 응시)</div><div class="jump">';

  function streakInfo(){
    var rs=results(), days={};
    rs.forEach(function(r){ var d=new Date(r.date); days[d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()]=1; });
    function key(dt){ return dt.getFullYear()+"-"+(dt.getMonth()+1)+"-"+dt.getDate(); }
    var today=new Date(), hasToday=!!days[key(today)], streak=0, cur=new Date(today);
    if(!hasToday) cur.setDate(cur.getDate()-1);
    while(days[key(cur)]){ streak++; cur.setDate(cur.getDate()-1); }
    return { streak:streak, today:hasToday, days:Object.keys(days).length, total:rs.length };
  }

    h+='<button class="btn ghost" data-login="email" style="margin-bottom:10px">✉️ 이메일로 '+(fb?"로그인":"시작")+'</button>';
    h+='<button class="btn primary" data-login="guest">👤 게스트로 바로 시작</button>';
    h+='</div>';
    h+='<p class="muted" style="font-size:12px;text-align:center;padding:0 16px">'+(fb?"로그인하면 여러 기기에서 기록이 동기화돼요(클라우드 저장).":"기록은 이 기기에 저장됩니다(오프라인 PWA). 게스트·이메일은 로컬 전용.")+'</p>';
    return h;
  }
  function vAccount(){
    var p=curProfile(), h=header("계정 · 설정","home");
    var tl=p?(p.type==="google"?"Google":p.type==="email"?"이메일":"게스트"):"게스트";
    h+='<div class="card"><div class="row"><div><div style="font-weight:800;font-size:16px">'+esc(p?p.name:"게스트")+'</div><div class="muted" style="font-size:12.5px">'+tl+(p&&p.email?(" · "+esc(p.email)):"")+'</div></div><span class="pill gold">현재</span></div></div>';
    h+='<div class="card"><div style="font-weight:800;margin-bottom:8px">글자 크기</div><div class="areachips">';
    var fs=load("hg2_font","md");
    [["sm","작게"],["md","보통"],["lg","크게"]].forEach(function(o){ h+='<button class="chip'+(fs===o[0]?" on":"")+'" data-fontsize="'+o[0]+'">'+o[1]+'</button>'; });
    h+='</div></div>';
    h+='<div class="card"><div class="row"><div style="font-weight:800">화면 테마</div><button class="btn ghost sm" data-theme-toggle="1" style="width:auto;padding:8px 14px">'+(isDark()?"☀️ 라이트로":"🌙 다크로")+'</button></div></div>';
    var ps=profiles();
    if(ps.length>1){ h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">프로필 전환</div>';
      ps.forEach(function(x){ h+='<div class="list-item row"><div>'+esc(x.name)+' <span class="muted" style="font-size:12px">'+esc(x.email||x.type)+'</span></div>'+(x.id===curId()?'<span class="pill">현재</span>':'<button class="btn ghost sm" data-switch="'+x.id+'" style="width:auto;padding:6px 12px">전환</button>')+'</div>'; });
      h+='</div>'; }
    h+='<button class="btn ghost" data-logout="1">로그아웃</button>';
    h+='<p class="muted" style="font-size:12px;text-align:center;margin-top:10px">기록은 이 기기에 프로필별로 저장돼요. 기기 간 동기화는 지원하지 않습니다.</p>';
    return h;
  }

  // -------- STATS (약점 추적) --------
  function statsAgg(){
    var rs=results(), ba={};
    rs.forEach(function(r){ var b=r.byArea||{}; Object.keys(b).forEach(function(a){ if(!ba[a])ba[a]=[0,0]; ba[a][0]+=b[a][0]; ba[a][1]+=b[a][1]; }); });
    return ba;
  }
  function bar(c,t){ var pct=t?Math.round(c/t*100):0; var col=pct>=80?"var(--ok)":pct>=60?"var(--accent)":"var(--no)";
    return '<div class="bw"><i style="width:'+pct+'%;background:'+col+'"></i></div><div class="pc" style="color:'+col+'">'+pct+'%</div>'; }
  function vStats(){
    var rs=results(), h=header("학습 통계",null);
    if(!rs.length){ h+='<div class="card center" style="padding:30px 16px"><div style="font-size:30px">📊</div><div style="font-weight:800;margin-top:8px">아직 기록이 없어요</div><div class="muted" style="font-size:13px;margin:6px 0 14px">모의고사를 풀면 영역별 약점·점수 추이가 쌓입니다.</div><button class="btn primary" data-go="examList">모의고사 풀기</button></div>'; return h; }
    var cs=rs.map(function(r){return r.correct;}), n=rs.length;
    var avg=Math.round(cs.reduce(function(a,b){return a+b;},0)/n), best=Math.max.apply(null,cs), wn=Object.keys(wrongMap()).length;
    h+='<div class="card"><div class="row"><div><div class="muted" style="font-size:12px">응시 '+n+'회</div><div style="font-weight:900;font-size:19px;margin-top:2px">평균 '+avg+'/50 · 최고 '+best+'/50</div></div><span class="gradeb '+gclass(gradeOf(avg).label)+'">평균 '+gradeOf(avg).label+'</span></div><div class="muted" style="font-size:12px;margin-top:6px">🔥 '+streakInfo().streak+'일 연속 · 누적 오답 '+wn+'개 · 2급 목표 40개</div></div>';
    var ba=statsAgg(), eC=0,eT=0,tC=0,tT=0;
    AREAS.forEach(function(a){var x=ba[a];if(!x)return;if(ERA.indexOf(a)>=0){eC+=x[0];eT+=x[1];}else{tC+=x[0];tT+=x[1];}});
    h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">시대 vs 주제</div>'+
       '<div class="statrow"><div class="nm">시대</div>'+bar(eC,eT)+'</div>'+
       '<div class="statrow"><div class="nm">주제</div>'+bar(tC,tT)+'</div></div>';
    var areas=AREAS.filter(function(a){return ba[a]&&ba[a][1]>0;}).sort(function(a,b){return (ba[a][0]/ba[a][1])-(ba[b][0]/ba[b][1]);});
    h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">영역별 정답률 <span class="muted" style="font-size:12px">(약점순 · 탭하면 연습)</span></div>';
    areas.forEach(function(a){ h+='<div class="statrow" data-practice-area="'+a+'" style="cursor:pointer"><div class="nm">'+esc(a)+'</div>'+bar(ba[a][0],ba[a][1])+'</div>'; });
    h+='</div>';
    var weak=areas.slice(0,3);
    if(weak.length){ h+='<div class="card" style="border-color:var(--no)"><div style="font-weight:800;margin-bottom:8px;color:var(--no)">⚠ 취약 영역 — 집중 연습 추천</div>';
      weak.forEach(function(a){ var pct=Math.round(ba[a][0]/ba[a][1]*100); h+='<div class="list-item row"><div>'+esc(a)+' <span class="muted" style="font-size:12px">'+ba[a][0]+'/'+ba[a][1]+' · '+pct+'%</span></div><button class="btn gold sm" data-practice-area="'+a+'" style="width:auto;padding:7px 14px">연습</button></div>'; });
      h+='</div>'; }
    h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">최근 응시</div>';
    rs.slice().reverse().slice(0,8).forEach(function(r){ var g=gradeOf(r.correct), dt=new Date(r.date), ds=(dt.getMonth()+1)+'/'+dt.getDate();
      h+='<div class="list-item row"><div>'+esc(String(r.exam))+'회 <span class="muted" style="font-size:12px">'+ds+'</span></div><span class="gradeb '+gclass(g.label)+'" style="font-size:12px">'+r.correct+'/'+r.total+' · '+g.label+'</span></div>'; });
    h+='</div>';
    return h;
  }

  // -------- CONCEPTS --------
  function vConcepts(){
    var h=header("개념 · D-7 요약",null);
    h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">① 시대별 한 줄 뼈대</div>';
    C.bones.forEach(function(b){ h+='<div class="list-item"><b style="color:var(--accent)">'+esc(b[0])+'</b> <span style="font-size:14px">'+esc(b[1])+'</span></div>'; });
    h+='</div>';
    h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">② 必出 순서 6종</div>';
    C.sequences.forEach(function(s){ h+='<div class="list-item"><b>'+esc(s[0])+'</b><div class="seq">'; s[1].forEach(function(step,i){ h+=(i?'<i>→</i>':'')+'<span>'+esc(step)+'</span>'; }); h+='</div></div>'; });
    h+='</div>';
    h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">③ 必出 함정 짝 ★</div>';
    C.traps.forEach(function(t){ h+='<div class="list-item" style="font-size:14px">'+esc(t)+'</div>'; });
    h+='</div>';
    h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">④ 주제 매칭</div>';
    C.matching.forEach(function(m){ h+='<div class="list-item"><b style="color:var(--accent)">'+esc(m[0])+'</b><div style="font-size:14px;margin-top:2px">'+esc(m[1])+'</div></div>'; });
    h+='</div>';
    h+='<div class="card" style="border-color:var(--gold)"><div style="font-weight:800;margin-bottom:6px;color:var(--gold)">⑤ 시험장 직전 TOP 6</div>';
    C.top6.forEach(function(t,i){ h+='<div class="list-item" style="font-size:14px"><b>'+(i+1)+'.</b> '+esc(t)+'</div>'; });
    h+='</div>';
    h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">점수 환산 (정답 수 → 급)</div>';
    C.grades.forEach(function(g){ h+='<div class="list-item row"><div><span class="gradeb '+gclass(g.label)+'">'+g.label+'</span></div><div class="muted">'+esc(g.label==="불합격"?"~29개":("≥"+g.min+"개"))+' · '+esc(g.score)+'</div></div>'; });
    h+='<div class="muted" style="font-size:12px;margin-top:8px">※ 1~3점 차등이라 근사치. 2급 안정권 = 40개(80%).</div></div>';
    return h;
  }

  // ================= EVENTS =================
  function bind(){
    app.querySelectorAll("[data-go]").forEach(function(e){e.onclick=function(){go(e.getAttribute("data-go"));};});
    app.querySelectorAll("[data-theme-toggle]").forEach(function(e){e.onclick=toggleTheme;});
    app.querySelectorAll("[data-nav]").forEach(function(e){e.onclick=function(){go(e.getAttribute("data-nav"));};});
    app.querySelectorAll("[data-tile]").forEach(function(e){e.onclick=function(){var t=e.getAttribute("data-tile");go(t==="exam"?"examList":t==="practice"?"practiceSetup":t);};});
    app.querySelectorAll("[data-ext]").forEach(function(e){e.onclick=function(){window.open(e.getAttribute("data-ext"),"_blank","noopener");};});
    app.querySelectorAll("[data-practice-area]").forEach(function(e){e.onclick=function(){ startPractice(e.getAttribute("data-practice-area"), 10); };});
    app.querySelectorAll("[data-login]").forEach(function(e){e.onclick=function(){ doLogin(e.getAttribute("data-login")); };});
    app.querySelectorAll("[data-q]").forEach(function(e){e.onclick=function(){ S.viewQ=e.getAttribute("data-q"); S.qBack=e.getAttribute("data-qback")||"search"; go("question"); };});
    app.querySelectorAll("[data-bm]").forEach(function(e){e.onclick=function(ev){ ev.stopPropagation(); var on=toggleBm(e.getAttribute("data-bm")); e.textContent=(S.view==="question")?(on?"⭐ 북마크됨":"☆ 북마크"):(on?"⭐":"☆"); toast(on?"북마크 추가":"북마크 해제"); };});
    var dse=app.querySelector("[data-dosearch]"); if(dse) dse.onclick=function(){ var el=document.getElementById("homeSearch"); S.searchQ=el?el.value:""; go("search"); };
    var dse2=app.querySelector("[data-dosearch2]"); if(dse2) dse2.onclick=function(){ var el=document.getElementById("sq"); S.searchQ=el?el.value:""; render(); };
    var shb=app.querySelector("[data-share]"); if(shb) shb.onclick=shareResult;
    var imgB=app.querySelector("[data-img]"); if(imgB) imgB.onclick=saveResultImage;
    var hsEl=document.getElementById("homeSearch"); if(hsEl) hsEl.onkeydown=function(ev){ if(ev.key==="Enter"){ S.searchQ=hsEl.value; go("search"); } };
    var sqEl=document.getElementById("sq"); if(sqEl) sqEl.onkeydown=function(ev){ if(ev.key==="Enter"){ S.searchQ=sqEl.value; render(); } };
    app.querySelectorAll("[data-fontsize]").forEach(function(e){e.onclick=function(){ setFont(e.getAttribute("data-fontsize")); };});
    app.querySelectorAll("[data-switch]").forEach(function(e){e.onclick=function(){ setCur(e.getAttribute("data-switch")); go("home"); };});
    var loBtn=app.querySelector("[data-logout]"); if(loBtn) loBtn.onclick=function(){ if(fbReady()&&S.fbUid){ try{HG2SYNC.signOut();}catch(e){} } S.fbUid=null; setCur(null); S.loginMode=null; go("login"); };
    var lbBtn=app.querySelector("[data-loginback]"); if(lbBtn) lbBtn.onclick=function(){ S.loginMode=null; render(); };
    if(S.view==="login") setupGoogle();
    app.querySelectorAll("[data-exam]").forEach(function(e){e.onclick=function(){startExam(e.getAttribute("data-exam"));};});
    var ib=document.getElementById("installBtn"); if(ib) ib.onclick=function(){ if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;} };

    if(S.view==="practiceSetup"){
      app.querySelectorAll("#chips .chip").forEach(function(e){e.onclick=function(){app.querySelectorAll("#chips .chip").forEach(function(x){x.classList.remove("on");});e.classList.add("on");S.pArea=e.getAttribute("data-area");};});
      app.querySelectorAll("#cnts .chip").forEach(function(e){e.onclick=function(){app.querySelectorAll("#cnts .chip").forEach(function(x){x.classList.remove("on");});e.classList.add("on");S.pCnt=+e.getAttribute("data-cnt");};});
      var sp=document.getElementById("startPractice"); if(sp) sp.onclick=function(){ startPractice(S.pArea||"ALL", S.pCnt||5); };
    }

    if(S.view==="quiz"){
      app.querySelectorAll("[data-opt]").forEach(function(e){e.onclick=function(){ S.answers[S.idx]=+e.getAttribute("data-opt"); render(); };});
      var bk=app.querySelector("[data-quit]"); if(bk) bk.onclick=function(){ if(confirm("나가면 진행 중인 풀이가 사라집니다. 나갈까요?")) go(S.mode==="exam"?"examList":"home"); };
      var pv=app.querySelector("[data-prev]"); if(pv) pv.onclick=function(){ if(S.idx>0){S.idx--;render();} };
      var nq=app.querySelector("[data-nextq]"); if(nq) nq.onclick=function(){ if(S.idx<S.questions.length-1){S.idx++;render();} };
      app.querySelectorAll("[data-jump]").forEach(function(e){e.onclick=function(){ S.idx=+e.getAttribute("data-jump"); render(); };});
      var ck=app.querySelector("[data-check]"); if(ck) ck.onclick=function(){ if(S.answers[S.idx]){ S.revealed[S.idx]=true; recordPractice(); render(); } };
      var nx=app.querySelector("[data-next]"); if(nx) nx.onclick=function(){ if(S.idx<S.questions.length-1){S.idx++;render();} else { toast("연습 완료"); go("home"); } };
      var sb=app.querySelector("[data-submit]"); if(sb) sb.onclick=function(){ var un=S.questions.length-Object.keys(S.answers).length; if(un>0 && !confirm(un+"문항이 미응시입니다. 제출할까요?")) return; submitExam(); };
    }

    if(S.view==="result"){
      var rv=app.querySelector("[data-review]"); if(rv) rv.onclick=function(){ S.reviewWrong=false; go("review"); };
      var rt=app.querySelector("[data-retry]"); if(rt) rt.onclick=function(){ startExam(rt.getAttribute("data-retry")); };
    }
    if(S.view==="review"){
      var tg=app.querySelector("[data-togglerev]"); if(tg) tg.onclick=function(){ S.reviewWrong=!S.reviewWrong; render(); };
    }
    if(S.view==="wrong"){
      var wr=app.querySelector("[data-wrongreview]"); if(wr) wr.onclick=startWrongReview;
      var cw=app.querySelector("[data-clearwrong]"); if(cw) cw.onclick=function(){ if(confirm("오답노트를 모두 비울까요?")){ save(pkey("wrong"),{}); render(); } };
    }
  }
  function recordPractice(){
    var q=S.questions[S.idx], ch=S.answers[S.idx], wm=wrongMap();
    if(ch===q.answer){ delete wm[q.src]; } else { wm[q.src]={area:q.area,exam:q.exam,n:q.n,q:q.q,ans:q.answer,chosen:ch,t:Date.now()}; }
    save(pkey("wrong"),wm);
  }

  // theme (다크모드)
  function isDark(){ var t=document.documentElement.getAttribute("data-theme"); if(t) return t==="dark"; return !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches); }
  function applyTheme(){ var t=load("hg2_theme",null); if(t==="dark"||t==="light") document.documentElement.setAttribute("data-theme",t); else document.documentElement.removeAttribute("data-theme"); var m=document.querySelector('meta[name="theme-color"]'); if(m) m.setAttribute("content", isDark()?"#0f141b":"#1e3a5f"); }
  function toggleTheme(){ save("hg2_theme", isDark()?"light":"dark"); applyTheme(); render(); }

  // PWA
  window.addEventListener("beforeinstallprompt",function(e){ e.preventDefault(); deferredPrompt=e; if(S.view==="home") render(); });

  // boot
  migrateLegacy();
  applyTheme();
  applyFont();
  if(window.HG2SYNC){ HG2SYNC.onUser(onFbUser); HG2SYNC.onReady(function(){ if(S.view==="login") render(); }); }
  if(!ALL.length){ app.innerHTML='<div class="card" style="margin-top:40px"><b>데이터를 불러오지 못했습니다.</b><div class="muted" style="font-size:13px;margin-top:6px">data/exam-1~5.js 파일이 같은 폴더에 있어야 합니다. 로컬 서버 또는 설치 환경에서 열어 주세요.</div></div>'; }
  else { if(!curProfile()) S.view="login"; render(); }
})();
</script>
